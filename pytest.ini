[tool:pytest]
# Pytest configuration for the project

# Test directories
testpaths = 
    liquidator/tests
    scripts/tests

# Test file patterns
python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_*


# Execution options
addopts = 
    --strict-markers
    --tb=short
    --verbose
    --color=yes
    --disable-warnings  # Disable third-party warnings
    -p no:warnings      # Don't show warnings

# Plugins
required_plugins = 
    pytest-cov
    pytest-mock

# Coverage configuration
[coverage:run]
source = liquidator
omit = 
    */tests/*
    */__init__.py
    */cli.py
    liquidator/__main__.py

[coverage:report]
# Coverage targets per module
fail_under = 85
precision = 2
show_missing = true
skip_covered = true

[coverage:html]
directory = htmlcov
title = Coverage Report - Colombia Payroll Settlement System 2025

[coverage:xml]
output = coverage.xml

# Custom markers
[tool:pytest.markers]
unit: Unit tests for individual components
integration: Integration tests for multiple components
compliance: Legal compliance specific tests
performance: Performance and load tests
edge_case: Edge case and extreme scenario tests
regression: Regression tests for previously fixed bugs