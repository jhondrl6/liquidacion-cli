# Payroll Settlement System Colombia 2025
# Production Configuration - Optimized for Production Deployment

system:
  version: "1.0.0"
  environment: "production"
  log_level: "WARNING"  # Only warnings and errors in production
  debug_mode: false
  performance_mode: true
  
params:
  year: 2025
  auto_update: false  # Manual updates only in production
  params_dir: "params/"
  backup_dir: "params/backup/"
  cache_enabled: true
  cache_ttl_hours: 24
  
compliance:
  enforce_by_default: true
  default_policy: "standard"  # middle ground for production
  allow_overrides: true
  override_require_justification: true
  override_require_operator_id: true
  max_override_attempts: 3
  audit_overrides: true
  
output:
  default_format: "json"
  generate_pdf: true
  pdf_style: "default"
  output_dir: "output/"
  compression_enabled: true
  retention_days: 2555  # 7 years
  
audit:
  enabled: true
  log_level: "INFO"
  retention_days: 2555  # 7 years for legal requirements
  audit_dir: "audit/"
  real_time_backup: true
  hash_verification: true
  
security:
  hash_algorithm: "sha256"
  encrypt_sensitive: true
  input_validation: "strict"
  rate_limiting:
    enabled: true
    max_requests_per_minute: 60
    max_requests_per_hour: 1000
  session_timeout_minutes: 30
  # Sensitive variables must be defined as environment variables:
  # LIQUIDACION_DB_PASSWORD
  # LIQUIDACION_ENCRYPTION_KEY
  
monitoring:
  metrics_enabled: true
  health_check_endpoint: "/health"
  performance_monitoring: true
  error_tracking: true
  usage_analytics: false  # GDPR compliant
  
logging:
  structured_logging: true
  json_format: true
  rotation_policy: "daily"
  max_file_size_mb: 100
  backup_count: 30
  log_sensitive_data: false
  
database:
  connection_pool_size: 10
  connection_timeout: 30
  query_timeout: 60
  retry_attempts: 3
  retry_delay: 1.0
  
api:
  rate_limit_per_api_key: 1000
  cors_enabled: false  # CLI tool, no need for CORS
  api_key_rotation: false
  
notifications:
  email_enabled: false
  slack_enabled: false
  critical_error_email: ""
  
maintenance:
  auto_cleanup: true
  cleanup_frequency_hours: 24
  disk_usage_threshold: 80
  memory_usage_threshold: 90
  
compliance_production_specific:
  legal_backup_required: true
  backup_encryption: true
  audit_trail_immutability: true
  compliance_report_retention_days: 2555
  emergency_override_2fa_required: true
