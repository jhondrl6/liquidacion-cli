name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Force Node 24 en todas las actions de JavaScript del job.
    # GitHub deprecó Node 20 el 2026-06-16 y la removerá completamente el
    # 2026-09-16. Sin esta env var, actions/checkout@v4 y
    # actions/setup-python@v5 corren con runtime de Node 20 (deprecation
    # warning en cada run). Bumpear a v5/v6 es la solución definitiva
    # pero requiere validar compat — la env var es el fix mecánico
    # documentado en REGISTRY (entrada S46) y funciona desde ya.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall liquidator

      - name: Lint (ruff)
        run: ruff check liquidator/

      - name: Type check (mypy)
        run: mypy liquidator/ --ignore-missing-imports || true

      - name: Tests (pytest)
        run: pytest liquidator/tests -q --tb=short

      - name: KB freshness
        run: python scripts/check_kb_freshness.py
