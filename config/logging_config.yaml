# Logging configuration - Based on production logging architecture

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s [%(levelname)s] [%(name)s] %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s [%(levelname)s] [%(name)s] [%(filename)s:%(lineno)d] %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  json:
    format: '{"time": "%(asctime)s", "level": "%(levelname)s", "name": "%(name)s", "message": "%(message)s"}'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
    
  file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/settlement.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    formatter: detailed
    
  audit_file:
    class: logging.FileHandler
    filename: audit/audit.log
    formatter: json
    
  error_file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    level: ERROR
    formatter: detailed

loggers:
  liquidator:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
    
  liquidator.audit:
    level: INFO
    handlers: [audit_file]
    propagate: false
    
  liquidator.compliance:
    level: INFO
    handlers: [console, file]
    propagate: false
    
  liquidator.calculators:
    level: INFO
    handlers: [file, error_file]
    propagate: false

root:
  level: INFO
  handlers: [console]